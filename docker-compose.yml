services:
  postgres:
    image: postgres:16
    container_name: postgres-db-finance-control
    restart: unless-stopped
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senhasupersecreta
      POSTGRES_DB: finance_control
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
